<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Friends</title>
  <meta name="description" content="This is my review on Friends">

  <!-- OG TAGS -->
  <meta property="og:title" content="Friends">
  <meta property="og:description" content="This is my review on Friends">
  <meta property="og:image" content="../../Images/Friends.jpg">
  <meta property="og:type" content="article">

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<body>

  <div class="page-container">
    <div class="book-banner" style="background-image: url('../../Images/Friends.jpg')">
      <div class="banner-overlay">
        <h1 class="banner-title">Friends</h1>
      </div>
    </div>
    <div class="content"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

  <script>
    const slug = "book4";
    const rating = 4;

    const date = new Date("Sat Sep 12 2026 05:30:00 GMT+0530 (India Standard Time)").toLocaleDateString("en-US", {
      year: "numeric",
      month: "long",
      day: "numeric"
    });

    fetch("../book-reviews/" + slug + ".md")
      .then(res => res.text())
      .then(md => {

        // remove frontmatter
        let cleaned = md.replace(/^---[\s\S]*?---/, "").trim();

        // remove first image (cover)
        cleaned = cleaned.replace(/!\[.*?\]\((.*?)\)/, "").trim();

        document.querySelector(".content").innerHTML = `
          <article class="article-body">

            <a href="../book-reviews.html" class="back-link">← Back to reviews</a>

            <div class="meta">
              <span>${date}</span>
            </div>

            <div class="book-rating">
              ${"★".repeat(rating)}${"☆".repeat(5 - rating)}
            </div>

            ${marked.parse(cleaned)}

          </article>
        `;
      });
  </script>

</body>
</html>
