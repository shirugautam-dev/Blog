<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>The_Answer_is_No</title>
  <meta name="description" content="This is my review on Book The Answer is No">

  <!-- OG TAGS -->
  <meta property="og:title" content="The_Answer_is_No">
  <meta property="og:description" content="This is my review on Book The Answer is No">
  <meta property="og:image" content="../../images/The_Answer_is_No.jpg">
  <meta property="og:type" content="article">

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<body>

  <div class="page-container">

    <!-- COVER BANNER -->
    <div class="book-banner">
      <img src="../../images/The_Answer_is_No.jpg" alt="cover">
    </div>

    <div class="content"></div>

  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

  <script>
    const slug = "book2";
    const rating = 2;

    const date = new Date("Fri Apr 10 2026 05:30:00 GMT+0530 (India Standard Time)").toLocaleDateString("en-US", {
      year: "numeric",
      month: "long",
      day: "numeric"
    });

    fetch("../book-reviews/" + slug + ".md")
      .then(res => res.text())
      .then(md => {

        // remove frontmatter
        let cleaned = md.replace(/^---[\s\S]*?---/, "").trim();

        // remove first image (cover)
        cleaned = cleaned.replace(/!\[.*?\]\((.*?)\)/, "").trim();

        document.querySelector(".content").innerHTML = `
          <article class="article-body">

            <a href="../book-reviews.html" class="back-link">← Back to reviews</a>

            <div class="meta">
              <span>${date}</span>
            </div>

            <div class="book-rating">
              ${"★".repeat(rating)}${"☆".repeat(5 - rating)}
            </div>

            ${marked.parse(cleaned)}

          </article>
        `;
      });
  </script>

</body>
</html>
