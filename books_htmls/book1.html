<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRITT-MARIE WAS HERE</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="page-container">

  <div class="book-hero">
    <div class="book-hero-img">
      <img src="Images/Britt_Mary_was_here.jpg" alt="BRITT-MARIE WAS HERE">
    </div>

    <div class="book-hero-content">
      <h1 class="book-hero-title">BRITT-MARIE WAS HERE</h1>

      <div class="book-rating">
        ★☆☆☆☆
      </div>

      <div class="book-meta">
        Apr 9, 2026
      </div>
    </div>
  </div>

  <div class="content"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

<script>
  const slug = "book1";

  fetch("../book-reviews/" + slug + ".md")
    .then(res => res.text())
    .then(md => {
      let cleaned = md.replace(/^---[\s\S]*?---/, "").trim();
      cleaned = cleaned.replace(/!\[.*?\]\((.*?)\)/, "").trim();

      document.querySelector(".content").innerHTML = `
        <article class="article-body">
          <a href="../book-reviews.html" class="back-link">← Back to reviews</a>
          ${marked.parse(cleaned)}
        </article>
      `;
    });
</script>

</body>
</html>
