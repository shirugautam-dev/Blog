  <script>
    const isGitHub = location.hostname.includes("github.io");
    const base = isGitHub ? "/Blog/" : "/";
    document.write(`<base href="${base}">`);
</script>

<body>
  <div id="progress-bar"></div>
  <div class="container">
    <button id="theme-toggle">🌙</button>
    <section class="intro">
      <img src="Images/Self_org.jpg" alt="Srijana">
      <p>
        Hi, I am Srijana. I started this blog out of my love for reading and writing.
        I try to write my honest and innermost thoughts. Some are already published in Medium and others are here
        only.
        I hope you will enjoy them.
      </p>
    </section>

    <section class="rss">
     <p class="top-info"><a href="rss.xml">Subscribe via RSS</a></p>
    </section>

    <div class="content">
      <main class="posts" id="articles"></main>
    </div>  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="js/articles.js"></script>
    <script src="js/article-loader.js"></script>

    <script src="js/theme.js"></script>
<script>
  if (document.querySelector(".article-body")) {
    window.addEventListener("scroll", () => {
      const scrollTop = window.scrollY;
      const docHeight = document.body.scrollHeight - window.innerHeight;
      const progress = (scrollTop / docHeight) * 100;

      document.getElementById("progress-bar").style.width = progress + "%";
    });
  }
</script>
</body>
